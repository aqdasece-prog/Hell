<!DOCTYPE html>
<html>
<head>
<title>Archive</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #0a0a0a;
  color: #eaeaea;
  font-family: monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.center {
  text-align: center;
}

input, button {
  padding: 10px;
  margin-top: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
  width: 200px;
}

button:hover {
  border-color: #00ffcc;
}
</style>
</head>

<body>

<div class="center">
  <p>This place remembers words, not people.</p>

  <input type="password" id="pass" placeholder="Enter password">
  <br>

  <button onclick="enter()">Enter</button>

  <p id="info"></p>
</div>

<script>
const BASE = "https://hell-rism.onrender.com";

async function enter() {
  const password = document.getElementById("pass").value;
  const info = document.getElementById("info");

  const res = await fetch(BASE + "/enter", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      password: password
    })
  });

  if (res.ok) {
    const data = await res.json();

    localStorage.setItem("s", data.session_id);

    window.location.href = "board.html";
  } else {
    info.innerText = "Access denied or room full.";
  }
}
</script>

</body>
</html>
