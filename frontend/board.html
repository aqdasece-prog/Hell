<!DOCTYPE html>
<html>
<head>

<title>Board</title>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<style>

body {
  background: #0a0a0a;
  color: #eaeaea;
  font-family: monospace;
  padding: 10px;
}

#stats {
  margin-bottom: 10px;
  color: #00ffcc;
}

#messages {
  height: 60vh;
  overflow-y: auto;
  margin-bottom: 15px;
  border: 1px solid #222;
  padding: 10px;
  background: #090909;
}

.msg {
  background: #111;
  padding: 10px;
  margin-bottom: 5px;
  border-left: 2px solid #00ffcc;
  word-wrap: break-word;
}

.input-row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
}

button {
  padding: 10px 15px;
  background: #111;
  border: 1px solid #333;
  color: white;
  cursor: pointer;
}

button:hover {
  border-color: #00ffcc;
}

</style>

</head>

<body>

<div id="stats">
  Active Users: ...
</div>

<div id="messages"></div>

<div class="input-row">

  <input
    id="msg"
    placeholder="Write something..."
  >

  <button onclick="send()">
    Post
  </button>

</div>

<script>

const BASE =
  "https://hell-beqq.onrender.com";

const session =
  localStorage.getItem("s");

if (!session) {
  window.location.href = "index.html";
}

let ws;

// ----------------------
// WEBSOCKET CONNECTION
// ----------------------

function connectWS() {

  ws = new WebSocket(
    "wss://hell-beqq.onrender.com/ws/" + session
  );

  ws.onopen = () => {
    console.log("WebSocket connected");
  };

  ws.onmessage = e => {

    add(e.data);

    updateStats();
  };

  ws.onerror = () => {
    console.log("WebSocket error");
  };

  ws.onclose = () => {

    console.log("WebSocket disconnected");

    // Auto reconnect
    setTimeout(connectWS, 3000);
  };
}

connectWS();

// ----------------------
// ADD MESSAGE
// ----------------------

function add(text) {

  let d =
    document.createElement("div");

  d.className = "msg";

  d.innerText = text;

  messages.appendChild(d);

  messages.scrollTop =
    messages.scrollHeight;
}

// ----------------------
// SEND MESSAGE
// ----------------------

async function send() {

  const text =
    msg.value.trim();

  if (!text) return;

  try {

    const res = await fetch(
      BASE + "/message/" + session,
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          content: text
        })
      }
    );

    if (!res.ok) {
      console.log("Message failed");
    }

  } catch (e) {

    console.log("Send error");
  }

  msg.value = "";
}

// ----------------------
// LOAD OLD MESSAGES
// ----------------------

async function load() {

  try {

    const r = await fetch(
      BASE + "/messages"
    );

    const data =
      await r.json();

    messages.innerHTML = "";

    data.forEach(
      m => add(m.content)
    );

  } catch (e) {

    console.log("Load failed");
  }
}

// ----------------------
// UPDATE STATS
// ----------------------

async function updateStats() {

  try {

    const res = await fetch(
      BASE + "/stats"
    );

    const data =
      await res.json();

    document.getElementById("stats")
      .innerText =
        `Active Users: ${data.active_users} / ${data.max_users}`;

  } catch (e) {

    console.log("Stats failed");
  }
}

// ----------------------
// ENTER KEY SUPPORT
// ----------------------

msg.addEventListener(
  "keypress",
  function(e) {

    if (e.key === "Enter") {
      send();
    }
  }
);

// ----------------------
// INITIAL LOAD
// ----------------------

load();

updateStats();

setInterval(updateStats, 3000);

</script>

</body>
</html>
