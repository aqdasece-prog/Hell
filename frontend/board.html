<!DOCTYPE html>
<html>
<head>
<title>Board</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #0a0a0a;
  color: #eaeaea;
  font-family: monospace;
  padding: 10px;
}

#stats {
  margin-bottom: 10px;
  color: #00ffcc;
}

#messages {
  height: 60vh;
  overflow-y: auto;
  margin-bottom: 15px;
  border: 1px solid #222;
  padding: 10px;
  background: #090909;
}

.msg {
  background: #111;
  padding: 10px;
  margin-bottom: 5px;
  border-left: 2px solid #00ffcc;
  word-wrap: break-word;
}

.input-row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
}

button {
  padding: 10px 15px;
  background: #111;
  border: 1px solid #333;
  color: white;
}

button:hover {
  border-color: #00ffcc;
}
</style>
</head>

<body>

<div id="stats">Active Users: ...</div>

<div id="messages"></div>

<div class="input-row">
  <input id="msg" placeholder="Write something...">
  <button onclick="send()">Post</button>
</div>

<script>
const BASE = "https://hell-rism.onrender.com";

const session = localStorage.getItem("s");

if (!session) {
  window.location.href = "index.html";
}

// Secure websocket
const ws = new WebSocket(
  "wss://hell-rism.onrender.com/ws/" + session
);

ws.onmessage = e => {
  add(e.data);
  updateStats();
};

ws.onclose = () => {
  console.log("Disconnected");
};

function add(text) {
  let d = document.createElement("div");

  d.className = "msg";
  d.innerText = text;

  messages.appendChild(d);

  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  const text = msg.value.trim();

  if (!text) return;

  const res = await fetch(
    BASE + "/message/" + session,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content: text
      })
    }
  );

  if (!res.ok) {
    console.log("Message failed");
  }

  msg.value = "";
}

async function load() {
  const r = await fetch(BASE + "/messages");

  const data = await r.json();

  data.forEach(m => add(m.content));
}

async function updateStats() {
  const res = await fetch(BASE + "/stats");

  const data = await res.json();

  document.getElementById("stats").innerText =
    `Active Users: ${data.active_users} / ${data.max_users}`;
}

load();

updateStats();

setInterval(updateStats, 3000);
</script>

</body>
</html>
