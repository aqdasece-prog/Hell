<!DOCTYPE html>
<html>
<head>

<title>Board</title>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<style>

body {
  background: #0a0a0a;
  color: #eaeaea;
  font-family: monospace;
  padding: 10px;
}

#stats {
  margin-bottom: 10px;
  color: #00ffcc;
}

#messages {
  height: 60vh;
  overflow-y: auto;
  margin-bottom: 15px;
  border: 1px solid #222;
  padding: 10px;
  background: #090909;
}

.msg {
  background: #111;
  padding: 10px;
  margin-bottom: 5px;
  border-left: 2px solid #00ffcc;
  word-wrap: break-word;
}

.timestamp {
  font-size: 12px;
  color: #777;
  margin-top: 5px;
}

.delete-btn {

  margin-top: 10px;

  background: #220000;

  border: 1px solid #550000;

  color: #ff7777;

  padding: 5px 10px;

  cursor: pointer;
}

.input-row {
  display: flex;
  gap: 10px;
}

input {

  flex: 1;

  padding: 10px;

  background: #111;

  border: 1px solid #333;

  color: white;
}

button {

  padding: 10px 15px;

  background: #111;

  border: 1px solid #333;

  color: white;

  cursor: pointer;
}

button:hover {
  border-color: #00ffcc;
}

</style>

</head>

<body>

<div id="stats">
  Active Users: ...
</div>

<div id="messages"></div>

<div class="input-row">

  <input
    id="msg"
    placeholder="Write something..."
  >

  <button onclick="send()">
    Post
  </button>

</div>

<script>

const BASE =
  "https://hell-beqq.onrender.com";

const session =
  localStorage.getItem("s");

const role =
  localStorage.getItem("role");

if (!session) {
  window.location.href =
    "index.html";
}

// -------------------
// LOAD MESSAGES
// -------------------

async function loadMessages() {

  try {

    const r = await fetch(
      BASE + "/messages"
    );

    const data =
      await r.json();

    messages.innerHTML = "";

    data.forEach(m => {

      let d =
        document.createElement("div");

      d.className = "msg";

      d.innerHTML = `
        <div>${m.content}</div>

        <div class="timestamp">
          ${m.timestamp}
        </div>
      `;

      // ADMIN DELETE
      if (role === "admin") {

        let del =
          document.createElement("button");

        del.className =
          "delete-btn";

        del.innerText =
          "Delete";

        del.onclick =
          () => deleteMessage(m.id);

        d.appendChild(del);
      }

      messages.appendChild(d);
    });

    const nearBottom =
  messages.scrollHeight -
  messages.scrollTop -
  messages.clientHeight < 100;

if (nearBottom) {

  messages.scrollTop =
    messages.scrollHeight;
}

  } catch (e) {

    console.log("Load failed");
  }
}

// -------------------
// SEND MESSAGE
// -------------------

async function send() {

  const text =
    msg.value.trim();

  if (!text) return;

  try {

    const res = await fetch(
      BASE + "/message/" + session,
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          content: text
        })
      }
    );

    // SESSION INVALID
    if (res.status === 403) {

      alert(
        "Session expired. Please reconnect."
      );

      localStorage.clear();

      window.location.href =
        "index.html";

      return;
    }

    msg.value = "";

    loadMessages();

  } catch (e) {

    console.log("Send failed");
  }
}

// -------------------
// DELETE MESSAGE
// -------------------

async function deleteMessage(id) {

  if (!confirm("Delete message?"))
    return;

  try {

    await fetch(
      BASE +
      "/delete/" +
      session +
      "/" +
      id,
      {
        method: "DELETE"
      }
    );

    loadMessages();

  } catch (e) {

    console.log("Delete failed");
  }
}

// -------------------
// HEARTBEAT
// -------------------

async function heartbeat() {

  try {

    await fetch(
      BASE + "/heartbeat/" + session,
      {
        method: "POST"
      }
    );

  } catch (e) {

    console.log("Heartbeat failed");
  }
}

// -------------------
// STATS
// -------------------

async function updateStats() {

  try {

    const res = await fetch(
      BASE + "/stats"
    );

    const data =
      await res.json();

    document.getElementById("stats")
      .innerText =
        `Active Users: ${data.active_users} / ${data.max_users}`;

  } catch (e) {

    console.log("Stats failed");
  }
}

// -------------------
// ENTER KEY SUPPORT
// -------------------

msg.addEventListener(
  "keypress",
  function(e) {

    if (e.key === "Enter") {
      send();
    }
  }
);

// -------------------
// START
// -------------------

loadMessages();

updateStats();

heartbeat();

// Refresh messages every 2 sec
setInterval(loadMessages, 2000);

// Refresh stats every 3 sec
setInterval(updateStats, 3000);

// Heartbeat every 10 sec
setInterval(heartbeat, 10000);

</script>

</body>
</html>
